services:
  nginx:
      image: nginx:alpine
      restart: unless-stopped
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx/linkShort.conf:/etc/nginx/conf.d/default.conf:ro
        - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
      depends_on:
        - backend
        - frontend
      networks:
        - internal

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/linkshort.db
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    volumes:
      - linkshort-data:/data
    networks:
      - internal

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.client
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  linkshort-data:
